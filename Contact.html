<title>Contact</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:serif;
    background:linear-gradient(90deg,
    rgba(9,9,121,1) 0%,
    rgba(4,3,24,1) 100%);
    color:white;
    min-height:100vh;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:40px 60px;
}

.name{
    font-size:35px;
    font-weight:bold;
    font-family:math;
}

.name a{
    color:white;
    text-decoration:none;
}

nav ul{
    display:flex;
    list-style:none;
    gap:20px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    transition:.3s;
}

nav ul li a:hover{
    color:#ffcc00;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:40px 20px;
}

.userDesc{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    flex-wrap:wrap;
}

.project1{
    width:270px;
    height:220px;
    background:white;
    border-radius:15px;
    color:#012738;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    transition:.3s;
}

.project1:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 30px rgba(0,0,0,.35);
}

.iconDiv{
    font-size:60px;
    margin-bottom:20px;
}

.iconText{
    font-size:22px;
    text-align:center;
    word-break:break-word;
}

.iconText a{
    text-decoration:none;
    color:#0A66C2;
    font-weight:bold;
}

.iconText a:hover{
    color:#ff9800;
}

@media(max-width:768px){

header{
    flex-direction:column;
    gap:20px;
}

nav ul{
    flex-wrap:wrap;
    justify-content:center;
}

.project1{
    width:90%;
    max-width:300px;
}

.iconText{
    font-size:18px;
}

}
</style>

</head>
